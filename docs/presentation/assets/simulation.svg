<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc"><title id="title">Simulation overview</title><desc id="desc">Current Simulation Runtime and Planned Simulation Framework overview.</desc><rect width="1100" height="360" rx="24" fill="#f6fbf8"/><text x="44" y="54" font-family="Arial" font-size="28" font-weight="700" fill="#111827">Simulation</text><text x="44" y="84" font-family="Arial" font-size="15" fill="#4b5563">Current runtime support and planned scenario capabilities are intentionally separated.</text><rect x="80" y="125" width="430" height="150" rx="22" fill="#ecfdf3" stroke="#2fbf71" stroke-width="3"/><text x="295" y="168" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#111827">Current Simulation Runtime</text><text x="295" y="204" text-anchor="middle" font-family="Arial" font-size="15" fill="#374151">diagnostic snapshot</text><text x="295" y="230" text-anchor="middle" font-family="Arial" font-size="15" fill="#374151">read-only recommendation output</text><text x="295" y="254" text-anchor="middle" font-family="Arial" font-size="13" fill="#6b7280">implemented foundation</text><rect x="590" y="125" width="430" height="150" rx="22" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/><text x="805" y="168" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#111827">Planned Simulation Framework</text><text x="805" y="204" text-anchor="middle" font-family="Arial" font-size="15" fill="#374151">replay and scenarios</text><text x="805" y="230" text-anchor="middle" font-family="Arial" font-size="15" fill="#374151">benchmarks and demo mode</text><text x="805" y="254" text-anchor="middle" font-family="Arial" font-size="13" fill="#6b7280">future architecture capability</text></svg>