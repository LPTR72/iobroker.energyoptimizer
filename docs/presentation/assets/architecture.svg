<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" role="img" aria-labelledby="title desc">
<title id="title">Architecture overview</title><desc id="desc">Layered architecture overview.</desc>
<rect width="1100" height="600" rx="24" fill="#f6fbf8"/>
<text x="44" y="54" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Architecture overview</text>
<text x="44" y="84" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">A neutral domain core sits behind runtime and integration boundaries.</text>
<rect x="390" y="120" width="320" height="76" rx="18" fill="#f9fafb" stroke="#9ca3af" stroke-width="2"/>
<text x="550" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">ioBroker Runtime</text>
<text x="550" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">lifecycle · polling · adapter states</text>
<path d="M550 200v44" stroke="#4b5563" stroke-width="2" marker-end="url(#a)"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#4b5563"/></marker></defs>
<rect x="300" y="250" width="500" height="82" rx="18" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="550" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#111827">Integration Boundaries</text>
<text x="550" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">state · forecast · tariff · history · devices</text>
<path d="M550 336v44" stroke="#4b5563" stroke-width="2" marker-end="url(#a)"/>
<rect x="250" y="386" width="600" height="128" rx="24" fill="#ecfdf3" stroke="#2fbf71" stroke-width="3"/>
<text x="550" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Domain Core</text>
<text x="550" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">assets · analysis · prediction · evaluation · recommendations</text>
<text x="550" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">history metrics · samples · buckets · quality metadata</text>
<rect x="74" y="262" width="200" height="100" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
<text x="174" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Providers</text>
<text x="174" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">forecast · tariff · weather</text>
<rect x="826" y="262" width="200" height="100" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
<text x="926" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">History Service</text>
<text x="926" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">collect · aggregate · store</text>
