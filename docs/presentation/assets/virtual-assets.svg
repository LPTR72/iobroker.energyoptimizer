<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420"><rect width="1100" height="420" rx="24" fill="#f6fbf8"/><text x="44" y="54" font-family="Arial" font-size="28" font-weight="700" fill="#111827">Pattern-based Virtual Energy Assets</text><text x="44" y="84" font-family="Arial" font-size="15" fill="#4b5563">Recurring behavior becomes useful only after evidence, confidence, and user confirmation.</text><g font-family="Arial"><rect x="60" y="165" width="160" height="80" rx="18" fill="#fff" stroke="#d1d5db" stroke-width="2"/><text x="140" y="212" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">History</text><text x="250" y="212" text-anchor="middle" font-size="24" fill="#4b5563">→</text><rect x="280" y="165" width="180" height="80" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/><text x="370" y="200" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">Pattern</text><text x="370" y="224" text-anchor="middle" font-size="13" fill="#6b7280">hypothesis</text><text x="490" y="212" text-anchor="middle" font-size="24" fill="#4b5563">→</text><rect x="520" y="165" width="180" height="80" rx="18" fill="#fff" stroke="#d1d5db" stroke-width="2"/><text x="610" y="200" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">User</text><text x="610" y="224" text-anchor="middle" font-size="13" fill="#6b7280">confirmation</text><text x="730" y="212" text-anchor="middle" font-size="24" fill="#4b5563">→</text><rect x="760" y="150" width="280" height="110" rx="22" fill="#ecfdf3" stroke="#2fbf71" stroke-width="3"/><text x="900" y="192" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">Virtual Energy Asset</text><text x="900" y="222" text-anchor="middle" font-size="14" fill="#374151">reusable knowledge for prediction</text></g><rect x="120" y="310" width="860" height="54" rx="16" fill="#fff" stroke="#d1d5db"/><text x="550" y="343" text-anchor="middle" font-family="Arial" font-size="15" fill="#374151">No silent device identification: detected regularity stays a hypothesis until the user confirms and enriches it.</text></svg>